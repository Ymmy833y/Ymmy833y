name: Generate Trophy SVG

on:
  schedule:
    - cron: "* */24 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate trophy
        uses: Erik-Donath/github-profile-trophy@feature/generate-svg
        with:
          username: Ymmy833y
          output_path: assets/trophy.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit generated SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/trophy.svg
          git diff --cached --quiet || git commit -m "chore: update trophy svg"
          git push
